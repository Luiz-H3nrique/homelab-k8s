apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homarr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Luiz-H3nrique/homelab-k8s.git'
    targetRevision: HEAD
    path: apps/homarr           # Aponta para a pasta onde estão o deployment e service do Homarr
  destination:
    server: 'https://kubernetes.default.svc' 
    namespace: homarr           # Namespace onde o Homarr será instalado no cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true    # Cria o namespace 'homarr' automaticamente se não existir
